<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
    <title>Ketuvia</title>
  </head>
  <body>
    <main>
      <section class="top-row">
        <div class="ketuvia-setting">
          <span>Ketuvia</span>
          <div class="segments ketuvia-segments" data-setting="ketuviaEnabled">
            <button id="ketuvia-on" type="button" data-value="true">On</button>
            <button id="ketuvia-off" type="button" data-value="false">Off</button>
          </div>
        </div>
        <button id="reset" type="button">Reset</button>
      </section>

      <section class="control-row">
        <div class="mini-setting lines-setting">
          <span>Lines</span>
          <div class="segments" data-setting="targetLines">
            <button type="button" data-value="1">1</button>
            <button type="button" data-value="2">2</button>
            <button type="button" data-value="3">3</button>
          </div>
        </div>
        <label class="mini-setting caps-setting caps-row">
          <span>All Caps</span>
          <input id="caps-toggle" type="checkbox">
          <span class="switch" aria-hidden="true"></span>
        </label>
        <div class="mini-setting shade-setting">
          <span>Shade</span>
          <div class="segments wide" data-setting="background">
            <button type="button" data-value="light">Light</button>
            <button type="button" data-value="medium">Med</button>
            <button type="button" data-value="dark">Dark</button>
          </div>
        </div>
      </section>

      <section class="font-position-row">
        <div class="font-setting">
          <span>Font</span>
          <div class="segments font-size-segments" data-setting="textSize" aria-label="Font size">
            <button type="button" data-value="small">A</button>
            <button type="button" data-value="medium">A</button>
            <button type="button" data-value="large">A</button>
          </div>
          <div class="font-list" data-setting="font">
            <button type="button" data-value="atkinson" style="font-family: 'Atkinson Hyperlegible', sans-serif;">Atkinson</button>
            <button type="button" data-value="cascadia" style="font-family: 'Cascadia Code', monospace; font-size: 9.5px; font-variant-ligatures: none;">Cascadia</button>
            <button type="button" data-value="noto" style="font-family: 'Noto Sans', sans-serif;">Noto</button>
            <button type="button" data-value="average" style="font-family: 'Average Sans', sans-serif;">Average</button>
            <button type="button" data-value="roboto" style="font-family: 'Roboto', sans-serif;">Roboto</button>
            <button type="button" data-value="bona" style="font-family: 'Bona Nova', serif;">Bona</button>
          </div>
        </div>

        <div class="position-setting">
          <span>Position</span>
          <div class="position-grid" data-setting="position" aria-label="Caption position">
            <button type="button" data-value="left-top" title="Left top" aria-label="Left top"></button>
            <button type="button" data-value="center-top" title="Center top" aria-label="Center top"></button>
            <button type="button" data-value="right-top" title="Right top" aria-label="Right top"></button>
            <button type="button" data-value="left-high" title="Left high" aria-label="Left high"></button>
            <button type="button" data-value="center-high" title="Center high" aria-label="Center high"></button>
            <button type="button" data-value="right-high" title="Right high" aria-label="Right high"></button>
            <button type="button" data-value="left-highish" title="Left highish" aria-label="Left highish"></button>
            <button type="button" data-value="center-highish" title="Center highish" aria-label="Center highish"></button>
            <button type="button" data-value="right-highish" title="Right highish" aria-label="Right highish"></button>
            <button type="button" data-value="left-middle" title="Left middle" aria-label="Left middle"></button>
            <button type="button" data-value="center-middle" title="Center middle" aria-label="Center middle"></button>
            <button type="button" data-value="right-middle" title="Right middle" aria-label="Right middle"></button>
            <button type="button" data-value="left-lowish" title="Left lowish" aria-label="Left lowish"></button>
            <button type="button" data-value="center-lowish" title="Center lowish" aria-label="Center lowish"></button>
            <button type="button" data-value="right-lowish" title="Right lowish" aria-label="Right lowish"></button>
            <button type="button" data-value="left-low" title="Left low" aria-label="Left low"></button>
            <button type="button" data-value="center-low" title="Center low" aria-label="Center low"></button>
            <button type="button" data-value="right-low" title="Right low" aria-label="Right low"></button>
            <button type="button" data-value="left-bottom" title="Left bottom" aria-label="Left bottom"></button>
            <button type="button" data-value="center-bottom" title="Center bottom" aria-label="Center bottom"></button>
            <button type="button" data-value="right-bottom" title="Right bottom" aria-label="Right bottom"></button>
          </div>
        </div>
      </section>

      <div class="bottom-row">
        <a id="donate" href="https://github.com/sponsors/intercalaris" target="_blank">Donate</a>
        <label class="debug-row">
          <span>Debug mode</span>
          <input id="debug-toggle" type="checkbox">
          <span class="switch" aria-hidden="true"></span>
        </label>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
